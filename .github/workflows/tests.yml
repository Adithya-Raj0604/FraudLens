name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate lightweight model fixture
        # models/*.json + Dataset/features.parquet are gitignored (470MB source
        # dataset) — this fits a small model on synthetic data so /predict,
        # /explain, /health work without the real training pipeline.
        run: python scripts/generate_ci_model.py

      - name: Run API tests
        run: pytest tests/test_api.py tests/test_api_contract.py -v

  ui-tests:
    name: UI tests (Selenium + pytest)
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Generate lightweight model fixture
        run: python scripts/generate_ci_model.py

      - name: Start backend (uvicorn)
        env:
          # Defaults to http://localhost:3000 (main.py) which isn't the origin
          # the UI tests actually run against — CORS then silently blocks every
          # fetch from the browser, so the API status indicator never goes online.
          FRONTEND_ORIGIN: http://127.0.0.1:4173
        run: |
          nohup uvicorn src.api.main:app --host 127.0.0.1 --port 8000 &
          npx wait-on http-get://127.0.0.1:8000/health --timeout 60000

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build + preview frontend
        working-directory: frontend
        env:
          # .env.production sets VITE_API_BASE="" (same-origin, for the real
          # CloudFront deploy) — dotenv won't override an already-set env var,
          # so this wins and points the built app at the local uvicorn backend.
          VITE_API_BASE: http://127.0.0.1:8000
        run: |
          npm run build
          nohup npm run preview -- --port 4173 --host 127.0.0.1 &
          npx wait-on http://127.0.0.1:4173 --timeout 60000

      - uses: browser-actions/setup-chrome@v1

      - name: Run UI tests
        env:
          UI_BASE_URL: http://127.0.0.1:4173
          HEADLESS: "true"
          # ANTHROPIC_API_KEY intentionally not set here — the live-agent test
          # self-skips without it. Add it as a repo secret to opt in.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/e2e -v
